services:
  postgres:
    image: postgres:16-alpine
    container_name: agent_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-agent_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_network

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_fastapi
    environment:
      DB_TYPE: postgresql
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-agent_db}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-auth-secret}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      METRICS_PORT: ${METRICS_PORT:-8001}
    ports:
      - "8000:8000"
      - "${METRICS_PORT:-8001}:${METRICS_PORT:-8001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - agent_network

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_celery
    environment:
      DB_TYPE: postgresql
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-agent_db}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-auth-secret}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
      CELERY_METRICS_PORT: ${CELERY_METRICS_PORT:-8002}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    ports:
      - "${CELERY_METRICS_PORT:-8002}:${CELERY_METRICS_PORT:-8002}"
    command: celery -A tasks.celery_tasks worker -l info
    networks:
      - agent_network

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_celery_beat
    environment:
      DB_TYPE: postgresql
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-agent_db}
      AUTH_SECRET: ${AUTH_SECRET:-change-this-auth-secret}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER: redis://redis:6379/0
      CELERY_BACKEND: redis://redis:6379/0
      ENABLE_METRICS: ${ENABLE_METRICS:-true}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: celery -A tasks.celery_tasks beat -l info
    networks:
      - agent_network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: agent_prometheus
    depends_on:
      - fastapi
      - celery
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - agent_network

  grafana:
    image: grafana/grafana:11.1.4
    container_name: agent_grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - agent_network

volumes:
  postgres_data:
  redis_data:
  grafana_data:


networks:
  agent_network:
    driver: bridge
