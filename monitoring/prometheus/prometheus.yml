global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fastapi
    metrics_path: /metrics
    static_configs:
      - targets:
          - fastapi:8001

  - job_name: celery_worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - celery:8002
